name: Build linux-aw2501

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/devcontainers/base:bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install full build dependencies (same as devcontainer)
        run: |
          apt update
          apt install -y \
            build-essential bc bison flex libssl-dev \
            devscripts debhelper fakeroot dh-exec \
            gcc-aarch64-linux-gnu crossbuild-essential-arm64 \
            git lsb-release wget unzip zip

      - name: Build kernel deb
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make deb

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: linux-aw2501-debs
          path: "*.deb"
