name: Build linux-aw2501

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许你手动点 Run workflow 触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo（浅克隆，只拉最新1层）
        uses: actions/checkout@v4
        with:
          fetch-depth: 1          # 关键：浅克隆，只下最新1次提交
          submodules: recursive   # 自动递归克隆所有子模块
          token: ${{ secrets.GITHUB_TOKEN }}  # 官方自动提供的Token

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bc bison flex libssl-dev debhelper

      - name: Build deb package
        run: |
          make deb

      - name: Upload deb files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-aw2501-deb
          path: |
            *.deb
            debian/*.deb
